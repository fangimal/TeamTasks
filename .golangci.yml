run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - revive

linters-settings:
  gofmt:
    simplify: true
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-rules:
    - path: _test\.go$
      linters:
        - errcheck
        - govet
  max-issues-per-linter: 0
  max-same-issues: 0
