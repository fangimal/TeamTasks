server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"
  shutdown_timeout: "5s"

database:
  host: "mysql"
  port: 3306
  user: "teamtasks"
  password: "teamtasks"
  name: "teamtasks"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

redis:
  host: "redis"
  port: 6379
  password: ""
  db: 0

logger:
  level: "info"
  format: "json"

jwt:
  secret: "change-me-in-env"
  expiration: "24h"

rate_limit:
  enabled: true
  requests_per_minute: 100

email_service:
  url: "https://httpbin.org"
  timeout: "5s"
